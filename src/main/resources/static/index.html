<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정책 RAG 테스트</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<main class="page">
  <header class="header">
    <h1>정책 RAG 테스트</h1>
    <div id="serverStatus" class="status neutral">서버 연결 확인 중...</div>
  </header>

  <section class="panel primary-panel">
    <div class="panel-title">
      <h2>사용자 질문</h2>
    </div>
    <form id="askForm" class="ask-form">
      <label class="full">
        질문
        <textarea id="question" rows="4">경기도 수원시에 사는 27살 취업준비생이 받을 수 있는 청년 정책 알려줘</textarea>
      </label>
      <div class="ask-actions">
        <label class="topk-field">
          검색 개수
          <input id="topK" type="number" min="1" max="10" value="5">
        </label>
        <button id="askButton" class="primary-button" type="submit">질문하기</button>
      </div>
    </form>
    <div id="conditionResult" class="condition-box"></div>
    <div id="askResult" class="answer"></div>
    <div id="sourceList" class="card-grid"></div>
  </section>

  <section class="panel">
    <details>
      <summary>관리자 테스트</summary>
      <div class="admin-grid">
        <button class="secondary-button" data-action="configStatus">환경변수 상태 확인</button>
        <button class="secondary-button" data-action="ragStatus">RAG 데이터 상태 확인</button>
        <button class="primary-button" data-action="ingestAll" data-job-type="INGEST_ALL">공공데이터 API 전체 수집 시작</button>
        <button class="secondary-button" data-action="ingestPublicService" data-job-type="INGEST_PUBLIC_SERVICE">행정안전부 공공서비스 API 수집 시작</button>
        <button class="secondary-button" data-action="ingestLocalWelfare" data-job-type="INGEST_LOCAL_WELFARE">지자체복지서비스 API 수집 시작</button>
        <button class="secondary-button" data-action="ingestCentralWelfare" data-job-type="INGEST_CENTRAL_WELFARE">중앙부처복지서비스 API 수집 시작</button>
        <button class="primary-button" data-action="indexReal" data-job-type="INDEX_REAL">실제 정책 데이터 인덱싱 시작</button>
        <button class="secondary-button" data-action="reindexReal" data-job-type="REINDEX_REAL">실제 정책 데이터 재인덱싱 시작</button>
        <button class="secondary-button" data-action="loadPolicies">저장된 정책 목록 불러오기</button>
      </div>
      <div id="adminResult" class="message"></div>
      <div id="jobStatusBox" class="job-status-list"></div>
      <div id="configStatusList" class="status-list"></div>
      <div id="ragStatusBox" class="rag-status"></div>
    </details>
  </section>

  <section class="panel">
    <div class="panel-title">
      <h2>정책 목록</h2>
      <div class="filter-controls">
        <label class="inline-check">
          <input id="youthOnly" type="checkbox" checked>
          청년 관련만 보기
        </label>
        <label class="inline-check">
          <input id="excludeSample" type="checkbox" checked>
          샘플 제외
        </label>
        <label class="inline-check">
          <input id="indexedOnly" type="checkbox">
          인덱싱 완료만 보기
        </label>
      </div>
    </div>
    <div id="policyList" class="card-grid"></div>
  </section>
</main>
<script src="/app.js"></script>
</body>
</html>
