services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragtest-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ragtest
      POSTGRES_USER: ragtest
      POSTGRES_PASSWORD: ragtest1234
    volumes:
      - ragtest-postgres-data:/var/lib/postgresql/data

volumes:
  ragtest-postgres-data:
